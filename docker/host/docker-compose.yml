# margo host — self-hostable comment server for teams using server-mode
# storage. Stand it up with one command:
#
#   docker compose up -d
#
# No env vars required. Open http://localhost:7331/signup in your
# browser and the first account to register becomes the superuser. Share
# the URL with teammates after that and they self-serve their own
# accounts; you grant project access from the dashboard or via
# `docker compose exec`.
#
# Persist /data via the named volume — that's where users.json + every
# project's git history lives. Losing it loses the audit trail.

services:
  margo-host:
    # Published image — `docker compose up -d` pulls and runs. Contributors
    # rebuild from local source by passing `--build` to compose; the build
    # block below is preserved for that case.
    image: margolabs/margo-host:0.4.3
    build:
      # Build context is packages/host/ (see Dockerfile header).
      context: ../../packages/host
      dockerfile: ../../docker/host/Dockerfile
    ports:
      - "${MARGO_HOST_PORT:-7331}:7331"
    volumes:
      - margo-data:/data
    restart: unless-stopped

volumes:
  margo-data:
